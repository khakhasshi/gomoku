<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>易诗雨和江景哲专属五子棋对战</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel hero-panel">
        <div class="badge">COUPLE GOMOKU</div>
        <h1>易诗雨和江景哲专属五子棋对战</h1>
        <p class="hero-text">这是易诗雨和江景哲的专属在线棋盘。江景哲使用藏青色棋子先手，易诗雨使用粉色棋子后手。</p>

        <div class="form-card">
          <label for="playerName">你的身份</label>
          <select id="playerName">
            <option value="江景哲" selected>江景哲</option>
            <option value="易诗雨">易诗雨</option>
          </select>

          <div class="action-grid">
            <button id="createRoomButton" class="primary">创建房间</button>
            <button id="joinRoomButton" class="secondary">加入房间</button>
          </div>

          <label for="roomCode">房间号</label>
          <div class="room-code-row">
            <input id="roomCode" maxlength="6" placeholder="输入 6 位房间号" />
            <button id="copyRoomButton" class="ghost">复制</button>
          </div>
        </div>

        <div class="status-card">
          <div>
            <span class="status-label">连接状态</span>
            <strong id="connectionStatus">连接中...</strong>
          </div>
          <div>
            <span class="status-label">房间号</span>
            <strong id="roomDisplay">未加入</strong>
          </div>
          <div>
            <span class="status-label">当前提示</span>
            <strong id="messageDisplay">欢迎来到你们的专属五子棋</strong>
          </div>
        </div>
      </aside>

      <main class="panel board-panel">
        <section class="meta-strip">
          <div class="meta-card">
            <span>江景哲 · 藏青色</span>
            <strong id="blackPlayer">等待加入</strong>
          </div>
          <div class="meta-card">
            <span>易诗雨 · 粉色</span>
            <strong id="whitePlayer">等待加入</strong>
          </div>
          <div class="meta-card">
            <span>轮到</span>
            <strong id="turnDisplay">--</strong>
          </div>
        </section>

        <section class="board-wrapper">
          <div id="board" class="board" aria-label="五子棋棋盘"></div>
        </section>

        <section class="footer-actions">
          <button id="rematchButton" class="primary light">再来一局</button>
          <button id="leaveRoomButton" class="secondary light">离开房间</button>
        </section>
      </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
